version: '3.8'

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed:ro
      - ./outputs:/app/outputs:ro

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed:ro
      - ./outputs:/app/outputs:ro
      - ./dashboard:/app/dashboard:ro
    depends_on:
      - api
