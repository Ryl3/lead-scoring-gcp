# GCP Cloud Build configuration for Cloud Run deployment
# This file configures the CI/CD pipeline for deploying to Cloud Run

steps:
  # Build the container image for API
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=api'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lead-scoring-api:$COMMIT_SHA'
      - '.'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/lead-scoring-api:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'lead-scoring-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lead-scoring-api:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '300'

  # Build the container image for Dashboard
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=dashboard'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lead-scoring-dashboard:$COMMIT_SHA'
      - '.'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/lead-scoring-dashboard:$COMMIT_SHA'

  # Deploy Dashboard to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'lead-scoring-dashboard'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lead-scoring-dashboard:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '2'
      - '--timeout'
      - '300'

images:
  - 'gcr.io/$PROJECT_ID/lead-scoring-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/lead-scoring-dashboard:$COMMIT_SHA'

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
